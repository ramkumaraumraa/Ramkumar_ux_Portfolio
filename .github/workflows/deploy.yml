name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Verify build output
        run: |
          echo "Total files built: $(find ./out -type f | wc -l)"
          ls ./out/

      - name: Deploy to Hostinger via SSH
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.FTP_PASSWORD }}" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            ./out/ \
            "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:~/public_html/"
